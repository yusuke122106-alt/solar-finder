<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Finder — ソーラーパネル検出ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0a0f1a; --surface:#111827; --surface2:#1a2333; --border:#1e3a5f;
    --accent:#f59e0b; --accent2:#3b82f6; --success:#10b981; --danger:#ef4444;
    --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:1000;flex-shrink:0;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;white-space:nowrap;}
  .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#f97316);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}

  .search-bar{display:flex;gap:6px;flex:1;min-width:180px;max-width:420px;position:relative;z-index:1001;}
  .search-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;width:100%;}
  .search-bar input:focus{border-color:var(--accent2);}
  .search-bar input::placeholder{color:var(--text3);}

  .pac-container{z-index:99999 !important;background:#1a2333 !important;border:1px solid #1e3a5f !important;border-radius:8px !important;margin-top:4px !important;font-family:'Inter',sans-serif !important;box-shadow:0 8px 24px rgba(0,0,0,0.6) !important;}
  .pac-item{padding:8px 12px !important;color:#94a3b8 !important;border-top:1px solid #1e3a5f !important;cursor:pointer !important;font-size:13px !important;line-height:1.5 !important;}
  .pac-item:hover,.pac-item-selected{background:#111827 !important;}
  .pac-item-query{color:#f1f5f9 !important;font-weight:600 !important;font-size:13px !important;}
  .pac-icon{display:none !important;}
  .pac-matched{color:#f59e0b !important;}
  .pac-logo::after{display:none !important;}

  .btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#fbbf24;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}

  .mode-toggle{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:8px;border:1px solid var(--border);}
  .mode-btn{padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
  .mode-btn.active{background:var(--accent);color:#000;}

  .header-stats{display:flex;gap:12px;margin-left:auto;font-size:12px;}
  .stat{display:flex;align-items:center;gap:5px;color:var(--text2);}
  .stat-value{font-weight:700;font-family:'JetBrains Mono',monospace;}
  .stat-value.green{color:var(--success);}
  .stat-value.yellow{color:var(--accent);}
  .stat-value.red{color:var(--danger);}

  .main{display:flex;flex:1;overflow:hidden;position:relative;}
  #map{flex:1;position:relative;}

  #drawOverlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;display:none;cursor:crosshair;}
  #drawOverlay.active{display:block;}
  #drawBox{position:absolute;border:2px solid var(--accent);background:rgba(245,158,11,0.12);display:none;pointer-events:none;}

  .scan-progress{position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);z-index:20;display:none;}
  .scan-progress.show{display:block;}
  .scan-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s;width:0%;}

  .draw-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:12px;font-weight:700;padding:7px 18px;border-radius:20px;z-index:15;display:none;pointer-events:none;white-space:nowrap;}
  .draw-hint.show{display:block;}

  .scan-overlay{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,15,26,0.96);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;z-index:20;display:none;min-width:250px;}
  .scan-overlay.show{display:block;}
  .scan-overlay-title{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .scan-phase{font-size:10px;background:var(--accent2);color:white;padding:2px 6px;border-radius:4px;font-weight:700;}
  .scan-phase.ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
  .scan-overlay-sub{font-size:12px;color:var(--text2);margin-bottom:10px;}
  .mini-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
  .mini-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s;}
  .cancel-btn{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;}
  .cancel-btn:hover{background:var(--danger);color:white;border-color:var(--danger);}

  .sidebar{width:295px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
  .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .sidebar-title{font-size:13px;font-weight:600;}
  .badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
  .sidebar-actions{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;}
  .filter-tabs{display:flex;padding:7px 12px;gap:4px;border-bottom:1px solid var(--border);}
  .filter-tab{flex:1;padding:5px 4px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;text-align:center;}
  .filter-tab.active{background:var(--surface2);color:var(--text);border-color:var(--accent2);}
  .filter-tab.solar-tab.active{border-color:var(--success);color:var(--success);}
  .filter-tab.nosolar-tab.active{border-color:var(--danger);color:var(--danger);}

  .flags-list{flex:1;overflow-y:auto;padding:6px;}
  .flags-list::-webkit-scrollbar{width:4px;}
  .flags-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .flag-item{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:8px;padding:9px 10px 9px 11px;margin-bottom:5px;cursor:pointer;transition:all 0.2s;position:relative;}
  .flag-item:hover{border-color:var(--accent2);transform:translateX(-2px);}
  .flag-item.has-solar{border-left-color:var(--success);}
  .flag-item.no-solar{border-left-color:var(--danger);}
  .flag-item.loading{border-left-color:var(--accent);}
  .flag-id{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px;}
  .flag-address{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:4px;}
  .flag-status{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;}
  .status-dot{width:6px;height:6px;border-radius:50%;}
  .status-dot.solar{background:var(--success);}
  .status-dot.no-solar{background:var(--danger);}
  .status-dot.unknown{background:var(--text3);}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .flag-delete{position:absolute;top:6px;right:6px;width:18px;height:18px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.2s;}
  .flag-delete:hover{background:var(--danger);color:white;}

  .solar-score{font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}
  .confidence-row{display:flex;align-items:center;gap:5px;margin-top:4px;}
  .confidence-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .confidence-fill{height:100%;background:linear-gradient(90deg,var(--success),#34d399);border-radius:2px;transition:width 0.3s;}
  .confidence-pct{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-width:30px;}
  .ai-badge{font-size:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}

  .empty-state{text-align:center;padding:28px 14px;color:var(--text3);}
  .empty-state-icon{font-size:26px;margin-bottom:10px;}
  .empty-state-text{font-size:12px;line-height:1.8;}

  .export-section{padding:10px 12px;border-top:1px solid var(--border);}
  .export-btn{width:100%;padding:9px;background:linear-gradient(135deg,var(--accent2),#6366f1);border:none;border-radius:8px;color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .export-btn:hover{opacity:0.9;}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;z-index:99999;display:none;pointer-events:none;white-space:nowrap;}
  .toast.show{display:block;animation:fadeInOut 2.8s ease forwards;}
  @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">☀️</div>
    Solar Finder
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 那須塩原、熊谷、前橋... 市名だけでOK！" autocomplete="off"/>
    <button class="btn btn-primary" onclick="searchAddress()">検索</button>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="modeClick" onclick="setMode('click')">📍 個別クリック</button>
    <button class="mode-btn" id="modeArea" onclick="setMode('area')">🔲 エリア自動</button>
  </div>

  <div class="header-stats">
    <div class="stat"><span>合計</span><span class="stat-value yellow" id="totalCount">0</span></div>
    <div class="stat"><span>🟢</span><span class="stat-value green" id="solarCount">0</span></div>
    <div class="stat"><span>🔴</span><span class="stat-value red" id="noSolarCount">0</span></div>
  </div>
</header>

<div class="main">
  <div id="map">
    <div id="drawOverlay"></div>
    <div id="drawBox"></div>
    <div class="scan-progress" id="scanProgress">
      <div class="scan-progress-bar" id="scanProgressBar"></div>
    </div>
    <div class="draw-hint" id="drawHint">🖱️ ドラッグして調査エリアを囲んでください</div>
    <div class="scan-overlay" id="scanOverlay">
      <div class="scan-overlay-title">
        <span id="scanPhaseLabel">🔍 建物を確認中...</span>
        <span class="scan-phase" id="scanPhaseBadge">STEP 1/2</span>
      </div>
      <div class="scan-overlay-sub" id="scanStatus">準備中...</div>
      <div class="mini-progress"><div class="mini-progress-bar" id="miniProgressBar" style="width:0%"></div></div>
      <button class="cancel-btn" onclick="cancelScan()">キャンセル</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">📋 検出結果</span>
      <span class="badge" id="flagBadge">0</span>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-secondary" style="flex:1;font-size:11px" onclick="clearAll()">🗑️ 全削除</button>
      <button class="btn btn-secondary" style="flex:1;font-size:11px" onclick="newArea()">➕ 新エリア</button>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all')">全て</button>
      <button class="filter-tab solar-tab" onclick="setFilter('solar')">🟢 あり</button>
      <button class="filter-tab nosolar-tab" onclick="setFilter('nosolar')">🔴 なし</button>
    </div>
    <div class="flags-list" id="flagsList">
      <div class="empty-state">
        <div class="empty-state-icon">🛰️</div>
        <div class="empty-state-text">
          <strong style="color:var(--text)">使い方</strong><br>
          1. 市名を入力 → 候補を選ぶ<br>
          2. 「エリア自動」をクリック<br>
          3. 地図の上でドラッグ<br>
          4. AI が自動スキャン！<br><br>
          🟢 = ソーラーあり（蓄電池営業対象）<br>
          🔴 = ソーラーなし<br><br>
          <span style="color:var(--accent2);font-size:10px">✨ Cloud Vision AI で衛星写真を解析</span>
        </div>
      </div>
    </div>
    <div class="export-section">
      <button class="export-btn" onclick="exportCSV()">📥 CSVエクスポート（Excel用）</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'AIzaSyBcATWao1nEV93-vh2R8QiUjVpfo9NVegg';

// Solar-related keywords for Vision API label matching
const SOLAR_KEYWORDS = [
  'solar panel', 'photovoltaic', 'solar cell', 'solar energy',
  'solar array', 'solar collector', 'solar farm', 'solar power',
  'photovoltaic system', 'solar module'
];

let map, geocoder, autocomplete;
let flags = [], markers = [];
let solarLabelCounter = 0; // counts only solar-panel houses for set numbering
let currentMode = 'click', currentFilter2 = 'all';
let isCancelled = false;
let isDrawing = false, drawStartX, drawStartY, drawStartLat, drawStartLng;

const drawOverlay = document.getElementById('drawOverlay');
const drawBox = document.getElementById('drawBox');

// ── Init ──────────────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 36.5657, lng: 139.8836 },
    zoom: 15,
    mapTypeId: 'hybrid',
    streetViewControl: false,
    fullscreenControl: false,
    gestureHandling: 'greedy',
  });
  geocoder = new google.maps.Geocoder();

  autocomplete = new google.maps.places.Autocomplete(
    document.getElementById('searchInput'),
    { componentRestrictions: { country: 'JP' }, fields: ['geometry', 'name', 'formatted_address'], types: ['geocode', 'establishment'] }
  );
  autocomplete.bindTo('bounds', map);
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (place.geometry?.location) {
      map.setCenter(place.geometry.location);
      place.geometry.viewport ? map.fitBounds(place.geometry.viewport) : map.setZoom(16);
      showToast('📍 ' + (place.formatted_address || place.name));
    }
  });

  map.addListener('click', (e) => {
    if (currentMode === 'click') addFlag(e.latLng.lat(), e.latLng.lng());
  });

  drawOverlay.addEventListener('mousedown', onOverlayMouseDown);
  drawOverlay.addEventListener('mousemove', onOverlayMouseMove);
  drawOverlay.addEventListener('mouseup', onOverlayMouseUp);
  drawOverlay.addEventListener('touchstart', onTouchStart, { passive: false });
  drawOverlay.addEventListener('touchmove', onTouchMove, { passive: false });
  drawOverlay.addEventListener('touchend', onTouchEnd);
}

// ── Search ────────────────────────────────────────────────
function searchAddress() {
  const raw = document.getElementById('searchInput').value.trim();
  if (!raw) return;
  const queries = [raw, raw + '市', raw + '市 栃木', raw + ' 日本'];
  let idx = 0;
  function tryNext() {
    if (idx >= queries.length) { showToast('❌ 見つかりませんでした。'); return; }
    geocoder.geocode({ address: queries[idx], region: 'JP', language: 'ja' }, (results, status) => {
      if (status === 'OK' && results[0]) {
        map.setCenter(results[0].geometry.location);
        results[0].geometry.viewport ? map.fitBounds(results[0].geometry.viewport) : map.setZoom(16);
        showToast('📍 ' + results[0].formatted_address);
      } else { idx++; tryNext(); }
    });
  }
  tryNext();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setTimeout(() => { const p = autocomplete.getPlace(); if (!p?.geometry) searchAddress(); }, 150);
});

// ── Mode ──────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeClick').classList.toggle('active', mode === 'click');
  document.getElementById('modeArea').classList.toggle('active', mode === 'area');
  document.getElementById('drawHint').classList.toggle('show', mode === 'area');
  drawOverlay.classList.toggle('active', mode === 'area');
}

// ── Draw overlay ──────────────────────────────────────────
function getMapCoords(clientX, clientY) {
  const rect = document.getElementById('map').getBoundingClientRect();
  const x = clientX - rect.left, y = clientY - rect.top;
  const bounds = map.getBounds();
  const ne = bounds.getNorthEast(), sw = bounds.getSouthWest();
  return {
    lat: ne.lat() - (y / rect.height) * (ne.lat() - sw.lat()),
    lng: sw.lng() + (x / rect.width) * (ne.lng() - sw.lng()),
    px: x, py: y
  };
}

function onOverlayMouseDown(e) {
  e.preventDefault();
  isDrawing = true;
  const c = getMapCoords(e.clientX, e.clientY);
  drawStartX = c.px; drawStartY = c.py; drawStartLat = c.lat; drawStartLng = c.lng;
  Object.assign(drawBox.style, { left: c.px+'px', top: c.py+'px', width: '0px', height: '0px', display: 'block' });
}
function onOverlayMouseMove(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const c = getMapCoords(e.clientX, e.clientY);
  Object.assign(drawBox.style, {
    left: Math.min(drawStartX, c.px)+'px', top: Math.min(drawStartY, c.py)+'px',
    width: Math.abs(c.px - drawStartX)+'px', height: Math.abs(c.py - drawStartY)+'px'
  });
}
function onOverlayMouseUp(e) {
  if (!isDrawing) return;
  isDrawing = false;
  drawBox.style.display = 'none';
  const c = getMapCoords(e.clientX, e.clientY);
  if (Math.abs(c.lat - drawStartLat) < 0.0003 || Math.abs(c.lng - drawStartLng) < 0.0003) {
    showToast('エリアが小さすぎます。もっと大きく囲んでください。'); return;
  }
  startAreaScan(new google.maps.LatLngBounds(
    new google.maps.LatLng(Math.min(drawStartLat, c.lat), Math.min(drawStartLng, c.lng)),
    new google.maps.LatLng(Math.max(drawStartLat, c.lat), Math.max(drawStartLng, c.lng))
  ));
}
function onTouchStart(e) { e.preventDefault(); onOverlayMouseDown(e.touches[0]); }
function onTouchMove(e) { e.preventDefault(); onOverlayMouseMove(e.touches[0]); }
function onTouchEnd(e) { onOverlayMouseUp(e.changedTouches[0]); }

// ── Cloud Vision API ──────────────────────────────────────
async function detectSolarWithVision(lat, lng) {
  // Satellite image of the building at zoom 20
  const imageUri = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=400x400&maptype=satellite&key=${API_KEY}`;

  const resp = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      requests: [{
        image: { source: { imageUri } },
        features: [
          { type: 'LABEL_DETECTION', maxResults: 20 },
          { type: 'OBJECT_LOCALIZATION', maxResults: 10 }
        ]
      }]
    })
  });

  if (!resp.ok) throw new Error('Vision API: ' + resp.status);
  const data = await resp.json();
  const res = data.responses?.[0] || {};

  const labels = (res.labelAnnotations || []).map(l => ({ name: l.description.toLowerCase(), score: l.score, display: l.description }));
  const objects = (res.localizedObjectAnnotations || []).map(o => ({ name: o.name.toLowerCase(), score: o.score, display: o.name }));
  const all = [...labels, ...objects];

  // Find highest-scoring solar-related match
  let bestScore = 0, bestLabel = '';
  for (const item of all) {
    if (SOLAR_KEYWORDS.some(kw => item.name.includes(kw) || kw.includes(item.name))) {
      if (item.score > bestScore) { bestScore = item.score; bestLabel = item.display; }
    }
  }

  return {
    hasSolar: bestScore > 0.25,
    confidence: Math.round(bestScore * 100),
    matchedLabel: bestLabel,
    topLabels: labels.slice(0, 5).map(l => l.display)
  };
}

// ── Solar label numbering (50 per set) ───────────────────
function nextSolarLabel() {
  solarLabelCounter++;
  const setNum = Math.ceil(solarLabelCounter / 50);
  const itemNum = ((solarLabelCounter - 1) % 50) + 1;
  return `${setNum}-${itemNum}`;
}

function renumberSolarFlags() {
  let count = 0;
  flags.filter(f => f.status === 'solar').forEach(f => {
    count++;
    const setNum = Math.ceil(count / 50);
    const itemNum = ((count - 1) % 50) + 1;
    f.label = `${setNum}-${itemNum}`;
    updateMarker(f);
  });
  solarLabelCounter = count;
}

// ── Area Scan ─────────────────────────────────────────────
async function startAreaScan(bounds) {
  isCancelled = false;
  document.getElementById('drawHint').classList.remove('show');
  const ne = bounds.getNorthEast(), sw = bounds.getSouthWest();
  const latDiff = ne.lat() - sw.lat(), lngDiff = ne.lng() - sw.lng();
  const latM = latDiff * 111000;
  const lngM = lngDiff * 111000 * Math.cos(sw.lat() * Math.PI / 180);
  const stepsLat = Math.min(Math.max(Math.round(latM / 40), 3), 15);
  const stepsLng = Math.min(Math.max(Math.round(lngM / 40), 3), 15);

  const points = [];
  for (let i = 0; i <= stepsLat; i++)
    for (let j = 0; j <= stepsLng; j++)
      points.push({ lat: sw.lat() + (latDiff / stepsLat) * i, lng: sw.lng() + (lngDiff / stepsLng) * j });

  const total = points.length;
  document.getElementById('scanOverlay').classList.add('show');
  document.getElementById('scanProgress').classList.add('show');

  // Phase 1: building confirmation (Solar API)
  document.getElementById('scanPhaseLabel').textContent = '🏠 建物を確認中...';
  document.getElementById('scanPhaseBadge').textContent = 'STEP 1/2';
  document.getElementById('scanPhaseBadge').classList.remove('ai');
  const buildings = [];
  for (let i = 0; i < points.length; i++) {
    if (isCancelled) break;
    const pct = Math.round(((i + 1) / total) * 50);
    document.getElementById('scanStatus').textContent = `${i + 1} / ${total} ポイント確認中`;
    document.getElementById('miniProgressBar').style.width = pct + '%';
    document.getElementById('scanProgressBar').style.width = pct + '%';

    const pt = points[i];
    if (isTooClose(pt.lat, pt.lng)) continue;

    try {
      const r = await fetch(
        `https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=${pt.lat}&location.longitude=${pt.lng}&requiredQuality=LOW&key=${API_KEY}`
      );
      const d = await r.json();
      if (!d.error) {
        const center = d.center
          ? { lat: d.center.latitude, lng: d.center.longitude }
          : { lat: pt.lat, lng: pt.lng };
        if (!isTooClose(center.lat, center.lng)) {
          buildings.push({
            lat: center.lat, lng: center.lng,
            panelCount: d.solarPotential?.maxArrayPanelsCount || null,
            roofArea: d.solarPotential?.wholeRoofStats?.areaMeters2?.toFixed(0) || null
          });
          // Mark as claimed to avoid duplicates
          flags.push({ uid: `tmp-${center.lat}-${center.lng}`, lat: center.lat, lng: center.lng, status: '_reserved' });
        }
      }
    } catch {}
    await sleep(100);
  }

  // Clean up reserved markers
  flags = flags.filter(f => f.status !== '_reserved');

  if (isCancelled) {
    document.getElementById('scanOverlay').classList.remove('show');
    document.getElementById('scanProgress').classList.remove('show');
    document.getElementById('drawHint').classList.add('show');
    return;
  }

  // Phase 2: AI Vision detection
  document.getElementById('scanPhaseLabel').textContent = '🤖 AI でソーラー検出中...';
  document.getElementById('scanPhaseBadge').textContent = 'STEP 2/2';
  document.getElementById('scanPhaseBadge').classList.add('ai');

  const bTotal = buildings.length;
  for (let i = 0; i < buildings.length; i++) {
    if (isCancelled) break;
    const b = buildings[i];
    const pct = 50 + Math.round(((i + 1) / bTotal) * 50);
    document.getElementById('scanStatus').textContent = `${i + 1} / ${bTotal} 棟 AI解析中`;
    document.getElementById('miniProgressBar').style.width = pct + '%';
    document.getElementById('scanProgressBar').style.width = pct + '%';

    await addFlagFromBuilding(b.lat, b.lng, b.panelCount, b.roofArea);
    await sleep(300);
  }

  document.getElementById('scanOverlay').classList.remove('show');
  document.getElementById('scanProgress').classList.remove('show');
  document.getElementById('scanProgressBar').style.width = '0%';
  document.getElementById('drawHint').classList.add('show');

  const solarFound = flags.filter(f => f.status === 'solar').length;
  showToast(`✅ AI スキャン完了！ ソーラーあり: ${solarFound}件`);
}

function cancelScan() {
  isCancelled = true;
  document.getElementById('scanOverlay').classList.remove('show');
  document.getElementById('scanProgress').classList.remove('show');
  document.getElementById('drawHint').classList.add('show');
}

// ── Add Flag (individual click) ───────────────────────────
async function addFlag(lat, lng) {
  if (isTooClose(lat, lng)) return;

  const uid = `uid-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const address = await reverseGeocode(lat, lng);
  const flag = { uid, label: '...', lat, lng, address, status: 'loading', confidence: null, matchedLabel: '', panelCount: null, roofArea: null };
  flags.push(flag);
  renderFlags();
  addMarker(flag);

  try {
    // Confirm building
    const r = await fetch(
      `https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=${lat}&location.longitude=${lng}&requiredQuality=LOW&key=${API_KEY}`
    );
    const d = await r.json();
    if (d.error?.code === 404) {
      removeFlagByUid(uid);
      showToast('🏢 建物が見つかりませんでした');
      return;
    }
    if (d.solarPotential) {
      flag.panelCount = d.solarPotential.maxArrayPanelsCount;
      flag.roofArea = d.solarPotential.wholeRoofStats?.areaMeters2?.toFixed(0);
    }
    const center = d.center ? { lat: d.center.latitude, lng: d.center.longitude } : { lat, lng };

    // AI detection
    const vision = await detectSolarWithVision(center.lat, center.lng);
    applyVisionResult(flag, vision);
  } catch (e) {
    console.error(e);
    flag.label = '-';
    flag.status = 'no-solar';
  }

  renderFlags();
  updateMarker(flag);
  updateStats();
}

// ── Add Flag (from area scan, building already confirmed) ─
async function addFlagFromBuilding(lat, lng, panelCount, roofArea) {
  if (isTooClose(lat, lng)) return;

  const uid = `uid-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const address = await reverseGeocode(lat, lng);
  const flag = { uid, label: '...', lat, lng, address, status: 'loading', confidence: null, matchedLabel: '', panelCount, roofArea };
  flags.push(flag);
  renderFlags();
  addMarker(flag);

  try {
    const vision = await detectSolarWithVision(lat, lng);
    applyVisionResult(flag, vision);
  } catch (e) {
    console.error(e);
    flag.label = '-';
    flag.status = 'no-solar';
  }

  renderFlags();
  updateMarker(flag);
  updateStats();
}

function applyVisionResult(flag, vision) {
  flag.confidence = vision.confidence;
  flag.matchedLabel = vision.matchedLabel;
  if (vision.hasSolar) {
    flag.label = nextSolarLabel();
    flag.status = 'solar';
  } else {
    flag.label = '';
    flag.status = 'no-solar';
  }
}

async function reverseGeocode(lat, lng) {
  try {
    return await new Promise((res, rej) =>
      geocoder.geocode({ location: { lat, lng }, language: 'ja' }, (r, s) =>
        s === 'OK' && r[0] ? res(r[0].formatted_address) : rej()
      )
    );
  } catch {
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

// ── Proximity check ───────────────────────────────────────
function isTooClose(lat, lng) {
  return flags.some(f => f.status !== '_reserved' && Math.abs(f.lat - lat) < 0.00008 && Math.abs(f.lng - lng) < 0.00008);
}

// ── Markers ───────────────────────────────────────────────
function addMarker(flag) {
  const { color, scale } = markerStyle(flag.status);
  const marker = new google.maps.Marker({
    position: { lat: flag.lat, lng: flag.lng },
    map,
    label: flag.status === 'solar' && flag.label
      ? { text: flag.label, color: '#fff', fontSize: '9px', fontWeight: 'bold' }
      : null,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale, fillColor: color, fillOpacity: 1, strokeColor: '#fff', strokeWeight: flag.status === 'solar' ? 2 : 1 },
    title: flag.address,
    zIndex: flag.status === 'solar' ? 20 : 5,
  });
  marker.addListener('click', () =>
    document.querySelector(`[data-uid="${flag.uid}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
  );
  markers.push({ uid: flag.uid, marker });
}

function updateMarker(flag) {
  const m = markers.find(m => m.uid === flag.uid);
  if (!m) return;
  const { color, scale } = markerStyle(flag.status);
  m.marker.setIcon({ path: google.maps.SymbolPath.CIRCLE, scale, fillColor: color, fillOpacity: 1, strokeColor: '#fff', strokeWeight: flag.status === 'solar' ? 2 : 1 });
  m.marker.setLabel(flag.status === 'solar' && flag.label ? { text: flag.label, color: '#fff', fontSize: '9px', fontWeight: 'bold' } : null);
  m.marker.setZIndex(flag.status === 'solar' ? 20 : 5);
}

function markerStyle(status) {
  if (status === 'solar')    return { color: '#10b981', scale: 14 };
  if (status === 'no-solar') return { color: '#ef4444', scale: 6 };
  return { color: '#f59e0b', scale: 10 }; // loading
}

// ── Render ────────────────────────────────────────────────
function setFilter(f) {
  currentFilter2 = f;
  document.querySelectorAll('.filter-tab').forEach((el, i) =>
    el.classList.toggle('active', ['all', 'solar', 'nosolar'][i] === f)
  );
  renderFlags();
}

function renderFlags() {
  const list = document.getElementById('flagsList');
  const visible = flags.filter(f => f.status !== '_reserved');
  document.getElementById('flagBadge').textContent = visible.length;

  let filtered = visible;
  if (currentFilter2 === 'solar')   filtered = visible.filter(f => f.status === 'solar');
  if (currentFilter2 === 'nosolar') filtered = visible.filter(f => f.status === 'no-solar');

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛰️</div><div class="empty-state-text"><strong style="color:var(--text)">使い方</strong><br>1. 市名を入力 → 候補を選ぶ<br>2. 「エリア自動」をクリック<br>3. 地図の上でドラッグ<br>4. AI が自動スキャン！<br><br>🟢 = ソーラーあり（蓄電池営業対象）<br>🔴 = ソーラーなし<br><br><span style="color:var(--accent2);font-size:10px">✨ Cloud Vision AI で衛星写真を解析</span></div></div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-text">該当なし</div></div>`;
    return;
  }

  const labels = { solar: '✅ ソーラーあり', 'no-solar': '❌ ソーラーなし', loading: '⏳ AI解析中...' };
  list.innerHTML = [...filtered].reverse().map(f => `
    <div class="flag-item ${f.status === 'solar' ? 'has-solar' : f.status === 'no-solar' ? 'no-solar' : 'loading'}"
         data-uid="${f.uid}" onclick="panToFlag('${f.uid}')">
      <button class="flag-delete" onclick="event.stopPropagation();deleteFlag('${f.uid}')">×</button>
      <div class="flag-id">
        ${f.status === 'solar' ? `# ${f.label}` : f.status === 'loading' ? '解析中...' : '対象外'}
        <span class="ai-badge">AI</span>
      </div>
      <div class="flag-address">${f.address}</div>
      <div class="flag-status">
        <div class="status-dot ${f.status === 'solar' ? 'solar' : f.status === 'no-solar' ? 'no-solar' : 'loading'}"></div>
        ${labels[f.status] || '不明'}
        ${f.confidence != null ? `<span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:4px">(確信度 ${f.confidence}%)</span>` : ''}
      </div>
      ${f.status === 'solar' && f.confidence != null ? `
        <div class="confidence-row">
          <div class="confidence-bar"><div class="confidence-fill" style="width:${f.confidence}%"></div></div>
          <span class="confidence-pct">${f.confidence}%</span>
        </div>` : ''}
      ${f.matchedLabel ? `<div class="solar-score">検出: ${f.matchedLabel}</div>` : ''}
      ${f.panelCount ? `<div class="solar-score">屋根ポテンシャル: ${f.panelCount}枚 | ${f.roofArea}㎡</div>` : ''}
    </div>`).join('');
}

function panToFlag(uid) {
  const f = flags.find(f => f.uid === uid);
  if (f) { map.panTo({ lat: f.lat, lng: f.lng }); map.setZoom(19); }
}

function deleteFlag(uid) {
  const idx = flags.findIndex(f => f.uid === uid);
  if (idx === -1) return;
  const wasSolar = flags[idx].status === 'solar';
  const mi = markers.findIndex(m => m.uid === uid);
  if (mi !== -1) { markers[mi].marker.setMap(null); markers.splice(mi, 1); }
  flags.splice(idx, 1);
  if (wasSolar) renumberSolarFlags();
  renderFlags();
  updateStats();
}

function removeFlagByUid(uid) {
  const idx = flags.findIndex(f => f.uid === uid);
  if (idx !== -1) {
    const mi = markers.findIndex(m => m.uid === uid);
    if (mi !== -1) { markers[mi].marker.setMap(null); markers.splice(mi, 1); }
    flags.splice(idx, 1);
  }
  renderFlags();
  updateStats();
}

function clearAll() {
  if (!confirm('全フラグを削除しますか？')) return;
  markers.forEach(m => m.marker.setMap(null));
  markers = []; flags = []; solarLabelCounter = 0;
  renderFlags(); updateStats();
}

function newArea() {
  showToast(`➕ 新エリア開始！ 現在 ${solarLabelCounter} 件 (セット${Math.ceil(solarLabelCounter/50)||1})`);
}

function updateStats() {
  const visible = flags.filter(f => f.status !== '_reserved');
  document.getElementById('totalCount').textContent = visible.length;
  document.getElementById('solarCount').textContent = visible.filter(f => f.status === 'solar').length;
  document.getElementById('noSolarCount').textContent = visible.filter(f => f.status === 'no-solar').length;
}

// ── CSV Export ────────────────────────────────────────────
function exportCSV() {
  const exportable = flags.filter(f => f.status === 'solar' || f.status === 'no-solar');
  if (!exportable.length) { showToast('フラグがありません'); return; }
  const rows = [['ラベル', '緯度', '経度', '住所', 'ステータス', 'AI確信度(%)', '検出ラベル', 'パネルポテンシャル(枚)', '屋根面積(㎡)']];
  exportable.forEach(f => rows.push([
    f.status === 'solar' ? f.label : '',
    f.lat.toFixed(6), f.lng.toFixed(6), f.address,
    f.status === 'solar' ? 'ソーラーあり' : 'ソーラーなし',
    f.confidence != null ? f.confidence : '',
    f.matchedLabel || '',
    f.panelCount || '', f.roofArea || ''
  ]));
  const csv = '﻿' + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `solar_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  showToast('📥 CSVをダウンロードしました！');
}

// ── Utilities ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
